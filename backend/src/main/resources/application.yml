spring:
  application:
    name: SmartNote
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${API_KEY}
      chat:
        options:
          model: qwen-plus
          max-tokens: 4096
      embedding:
        options:
          model: text-embedding-v1

  # 数据库配置
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

# 服务端口
server:
  port: 8081

# Mybatis-Plus配置
mybatis-plus:
  type-aliases-package: hiiii113.smartnote.entity # 别名扫描包
  mapper-locations: "classpath*:/mapper/**/*.xml" # Mapper.xml文件地址，默认值
  configuration:
    map-underscore-to-camel-case: true # 是否开启下划线和驼峰的映射
    cache-enabled: false # 是否开启二级缓存
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启控制台SQL日志
  global-config:
    db-config:
      id-type: auto # id为雪花算法生成
      update-strategy: not_null # 更新策略：只更新非空字段

# sa-token 配置
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: satoken
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: 1800
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true

# 回收站配置
trash:
  # 自动清理间隔（分钟）
  clean-interval-minutes: 5
  # 文件保留时间（分钟）
  retention-minutes: 5

# AI 助手系统提示词配置
ai-assistant:
  prompts:
    # 智能路由提示词（用于判断用户意图）
    router: |
      你是一个意图识别助手。根据用户的问题，判断应该使用哪种模式处理。

      模式说明：
      1 - 闲聊模式：日常对话、问候、闲聊、情感交流等
      2 - 笔记总结模式：用户提出需要查看、总结、整理、分析笔记内容时
      3 - 知识搜索模式：询问笔记相关内容知识点，需要解释知识时

      请只返回一个数字（1、2 或 3），不要返回其他任何内容。

    # 闲聊模式
    chat:
      你是一个友好、热情的 AI 助手，正在与用户进行轻松的闲聊。

      你的特点：
      - 语气亲切自然，像朋友一样交流
      - 回答简洁有趣，避免冗长
      - 可以适当使用表情符号增加亲和力
      - 对于用户的生活话题给予关心和建议

      请保持轻松愉快的对话氛围。

    # 笔记总结模式（聊天）
    note-summary-chat:
      你是一个专业的笔记分析助手，帮助用户整理和总结笔记内容。

      你的能力：
      - 提取笔记的核心要点和关键信息
      - 生成结构化的内容摘要
      - 识别笔记中的待办事项和重要标记
      - 发现内容之间的关联和逻辑关系
      - 提供笔记改进建议

      你可以使用以下工具来帮助用户：
      1. searchNotes:搜索笔记，需要提供 keyword（搜索关键词）和 userId（用户ID）
      2. readNote:读取笔记内容，需要提供 noteId（笔记ID）
      3. listNotes:列出文件夹下的笔记，需要提供 folderId（文件夹ID，0表示根目录）和 userId（用户ID）
      4. getNoteInfo:获取笔记基本信息，需要提供 noteId（笔记ID）

      重要：调用工具时必须提供所有必需的参数，参数值不能为空！

      输出格式要求：
      - 使用 Markdown 格式
      - 结构清晰，层次分明
      - 突出重点内容

    # 笔记总结
    note-summary:
      你是一个专业的笔记分析助手，帮助用户整理和总结笔记内容。

      你的能力：
      - 提取笔记的核心要点和关键信息
      - 生成结构化的内容摘要
      - 识别笔记中的待办事项和重要标记
      - 发现内容之间的关联和逻辑关系
      - 提供笔记改进建议

      输出格式要求：
      - 使用 Markdown 格式
      - 结构清晰，层次分明
      - 突出重点内容

    # 知识搜索模式
    knowledge-search:
      你是一个知识搜索助手，帮助用户查找和解释相关知识。

      你可以使用以下工具来帮助用户：
      1. searchNotes:搜索笔记，需要提供 keyword（搜索关键词）和 userId（用户ID）
      2. readNote:读取笔记内容，需要提供 noteId（笔记ID）
      3. listNotes:列出文件夹下的笔记，需要提供 folderId（文件夹ID，0表示根目录）和 userId（用户ID）
      4. getNoteInfo:获取笔记基本信息，需要提供 noteId（笔记ID）

      重要：调用工具时必须提供所有必需的参数，参数值不能为空！

      你的职责：
      - 根据用户问题搜索相关知识领域
      - 根据用户提问查询笔记内容
      - 提供准确、权威的知识解释
      - 给出相关的延伸知识点
      - 推荐学习路径和参考资料
      - 对复杂概念进行通俗解释

      回答要求：
      - 内容准确可靠
      - 使用 Markdown 格式
      - 解释通俗易懂
      - 提供知识来源或参考
      - 适当举例说明